<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --blue:#4da6ff;--blue-light:#e8f4ff;--blue-mid:#b3d9ff;
  --blue-dark:#1a7fd4;--blue-darker:#0f5fa8;
  --white:#fff;--bg:#f0f7ff;--text:#1a1a2e;--muted:#6b7a99;
  --border:#c8dff5;--card:#fff;
  --success:#22c55e;--warning:#f59e0b;--danger:#ef4444;
  --shadow:0 2px 16px rgba(26,127,212,.08);
  --shadow-lg:0 8px 32px rgba(26,127,212,.18);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
h1,h2,h3,h4{font-family:'Plus Jakarta Sans',sans-serif}
a{color:var(--blue-dark);text-decoration:none}

nav{background:var(--white);border-bottom:1.5px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:62px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.logo{display:flex;align-items:center;gap:8px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:1.35rem;color:var(--blue-dark)}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--blue-dark),var(--blue));border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:800}
.nav-tabs{display:flex;gap:4px}
.nav-tab{padding:6px 15px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .2s}
.nav-tab.active,.nav-tab:hover{background:var(--blue-light);color:var(--blue-dark)}
.nav-actions{display:flex;gap:8px;align-items:center}

.btn{padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;font-family:'Plus Jakarta Sans',sans-serif}
.btn-outline{background:transparent;border:1.5px solid var(--blue-dark);color:var(--blue-dark)}
.btn-outline:hover{background:var(--blue-light)}
.btn-primary{background:var(--blue-dark);color:#fff}
.btn-primary:hover{background:var(--blue-darker);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-sm{padding:5px 13px;font-size:12px}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{filter:brightness(.9)}
.btn-warning{background:var(--warning);color:#fff}

.city-selector-bar{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:50px;padding:6px 16px;display:inline-flex;align-items:center;gap:8px;margin-bottom:1rem;cursor:pointer;transition:background .2s}
.city-selector-bar:hover{background:rgba(255,255,255,.2)}
.city-dropdown-panel{position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--white);border:1.5px solid var(--border);border-radius:16px;box-shadow:var(--shadow-lg);padding:.75rem;min-width:320px;z-index:500;animation:fadeIn .2s ease}
.city-dropdown-search{width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);outline:none;margin-bottom:8px}
.city-dropdown-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;max-height:240px;overflow-y:auto}
.city-option{padding:8px 12px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px;transition:background .15s;color:var(--text)}
.city-option:hover{background:var(--blue-light);color:var(--blue-dark)}
.city-option.selected{background:var(--blue-dark);color:#fff}

.hero{background:linear-gradient(135deg,var(--blue-darker),var(--blue-dark) 45%,var(--blue));padding:2.5rem 1.5rem 2rem;text-align:center;color:#fff;position:relative}
.hero-city-wrapper{position:relative;display:inline-block;margin-bottom:.25rem}
.hero h1{font-size:2.3rem;font-weight:800;margin-bottom:.4rem;line-height:1.2}
.hero-city-name{color:#ffe066}
.hero p{font-size:1rem;opacity:.9;margin-bottom:1.5rem}
.search-bar{background:#fff;border-radius:50px;padding:6px;display:flex;max-width:640px;margin:0 auto;box-shadow:0 8px 30px rgba(0,0,0,.15)}
.search-bar input{flex:1;border:none;outline:none;padding:8px 16px;font-size:14px;font-family:'DM Sans',sans-serif;background:transparent;color:var(--text)}
.search-bar select{border:none;outline:none;padding:8px 12px;font-size:14px;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;cursor:pointer}

.stats-bar{display:flex;background:var(--white);border-bottom:1px solid var(--border)}
.stat-item{flex:1;padding:1rem;text-align:center;border-right:1px solid var(--border)}
.stat-item:last-child{border-right:none}
.stat-num{font-size:1.45rem;font-weight:800;color:var(--blue-dark);font-family:'Plus Jakarta Sans',sans-serif}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.city-stat-badge{display:inline-flex;align-items:center;gap:4px;background:var(--blue-light);color:var(--blue-dark);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;margin-bottom:.4rem}

.area-chips{padding:1rem 1.5rem;display:flex;gap:8px;flex-wrap:wrap;background:var(--white);border-bottom:1px solid var(--border)}
.chip{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);color:var(--muted);background:var(--white);transition:all .2s}
.chip.active,.chip:hover{background:var(--blue-light);color:var(--blue-dark);border-color:var(--blue-mid)}

.section{padding:1.5rem}
.section-title{font-size:1rem;font-weight:700;margin-bottom:1rem}
.parking-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem}
.parking-card{background:var(--card);border-radius:16px;border:1.5px solid var(--border);overflow:hidden;cursor:pointer;transition:all .2s;box-shadow:var(--shadow);animation:fadeIn .3s ease both}
.parking-card:hover{border-color:var(--blue-mid);box-shadow:var(--shadow-lg);transform:translateY(-3px)}
.card-img{height:120px;background:linear-gradient(135deg,var(--blue-light),var(--blue-mid));display:flex;align-items:center;justify-content:center;font-size:2.5rem;position:relative}
.card-badge{position:absolute;top:10px;right:10px;padding:4px 10px;border-radius:12px;font-size:11px;font-weight:600}
.badge-available{background:#dcfce7;color:#166534}
.badge-full{background:#fee2e2;color:#991b1b}
.badge-limited{background:#fef3c7;color:#92400e}
.card-body{padding:1rem}
.card-name{font-weight:700;font-size:.95rem;margin-bottom:3px}
.card-area{font-size:12px;color:var(--muted);margin-bottom:8px}
.card-meta{display:flex;justify-content:space-between;align-items:center}
.card-price{font-weight:700;color:var(--blue-dark);font-size:1rem}
.slot-bar{height:6px;background:var(--blue-light);border-radius:3px;margin:8px 0;overflow:hidden}
.slot-fill{height:100%;background:var(--blue-dark);border-radius:3px;transition:width .5s}
.slot-info{display:flex;justify-content:space-between;font-size:11px;color:var(--muted)}

.modal-overlay{position:fixed;inset:0;background:rgba(15,40,80,.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:var(--white);border-radius:20px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(15,40,80,.25);animation:modalPop .25s ease}
.modal-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--white);z-index:1}
.modal-header h3{font-size:1.1rem;font-weight:700}
.close-btn{width:30px;height:30px;border-radius:50%;background:var(--blue-light);border:none;cursor:pointer;color:var(--blue-dark);font-size:16px;display:flex;align-items:center;justify-content:center}
.close-btn:hover{background:var(--blue-mid)}
.modal-body{padding:1.5rem}

.detail-hero{background:linear-gradient(135deg,var(--blue-light),var(--blue-mid));border-radius:12px;padding:1.5rem;margin-bottom:1.25rem;text-align:center}
.detail-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:1.25rem}
.dstat{background:var(--bg);border-radius:10px;padding:.75rem;text-align:center;border:1px solid var(--border)}
.dstat-val{font-size:1.3rem;font-weight:800;font-family:'Plus Jakarta Sans',sans-serif}
.dstat-val.green{color:var(--success)}.dstat-val.blue{color:var(--blue-dark)}.dstat-val.red{color:var(--danger)}
.dstat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase}

.slot-box{border-radius:6px;border:1.5px solid;display:flex;align-items:center;justify-content:center;font-weight:600;cursor:pointer;transition:all .15s;user-select:none;flex-shrink:0}
.slot-box.available{border-color:#22c55e;background:#f0fdf4;color:#166534}
.slot-box.available:hover{background:#dcfce7;transform:scale(1.08)}
.slot-box.booked{border-color:var(--blue-dark);background:var(--blue-light);color:var(--blue-dark);cursor:not-allowed;opacity:.85}
.slot-box.selected{border-color:var(--blue-dark);background:var(--blue-dark);color:#fff;transform:scale(1.08)}
.legend-dot{width:13px;height:13px;border-radius:3px;display:inline-block;border:1.5px solid}

.form-group{margin-bottom:1rem}
.form-label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:block}
.form-input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;background:var(--white);color:var(--text);outline:none;transition:border .2s}
.form-input:focus{border-color:var(--blue-dark);box-shadow:0 0 0 3px rgba(77,166,255,.15)}
.form-input.error{border-color:var(--danger)!important;background:#fff8f8}
.field-error{font-size:11.5px;color:var(--danger);margin-top:4px;display:none;font-weight:500}
.field-error.show{display:block}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.payment-summary{background:var(--bg);border-radius:12px;padding:1rem;margin-bottom:1rem}
.pay-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px dashed var(--border)}
.pay-row:last-child{border:none}
.pay-total{font-weight:800;font-size:15px;color:var(--blue-dark);padding-top:10px}
.razorpay-btn{width:100%;padding:14px;background:linear-gradient(135deg,#072654,#1a7fd4);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:12px;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s}
.razorpay-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(26,127,212,.35)}
.razorpay-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

.success-screen{text-align:center}
.success-icon{font-size:3.5rem;margin-bottom:.75rem;animation:bounceIn .5s ease}
.ticket{background:linear-gradient(135deg,var(--blue-light),#fff);border:1.5px dashed var(--blue-mid);border-radius:16px;padding:1.25rem;margin:1rem 0;text-align:left}
.ticket-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px dashed var(--border)}
.ticket-row:last-child{border:none}
.ticket-row span:last-child{font-weight:600;color:var(--blue-dark)}
.ticket-id{text-align:center;margin-top:.75rem;font-size:14px;font-weight:800;letter-spacing:1px;color:var(--blue-darker);padding:8px;background:rgba(77,166,255,.12);border-radius:8px}
.cancel-warning{background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:10px 14px;font-size:12px;color:#856404;margin-top:10px;text-align:center}

.step-indicator{display:flex;align-items:center;margin-bottom:1.25rem}
.step{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;color:var(--muted)}
.step-num{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;background:var(--white)}
.step.active .step-num{background:var(--blue-dark);border-color:var(--blue-dark);color:#fff}
.step.done .step-num{background:var(--success);border-color:var(--success);color:#fff}
.step.active{color:var(--blue-dark)}
.step-line{flex:1;height:2px;background:var(--border)}
.step-line.done{background:var(--success)}

.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:12px 24px;border-radius:50px;font-size:13px;font-weight:600;z-index:9999;animation:toastIn .3s ease;white-space:nowrap}
.toast.success{background:#166534}.toast.error{background:#991b1b}.toast.info{background:var(--blue-dark)}

.history-item{background:var(--white);border-radius:12px;border:1.5px solid var(--border);padding:1rem;margin-bottom:.75rem;display:flex;justify-content:space-between;align-items:flex-start;box-shadow:var(--shadow)}
.history-name{font-weight:700;font-size:.9rem;margin-bottom:3px}
.history-sub{font-size:12px;color:var(--muted)}
.history-price{font-weight:800;color:var(--blue-dark);font-size:1rem}
.status-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-top:4px}
.status-active{background:#dcfce7;color:#166534}
.status-cancelled{background:#fee2e2;color:#991b1b}

.auth-card{max-width:420px;margin:3rem auto;padding:0 1.5rem}
.auth-inner{background:var(--white);border-radius:20px;border:1.5px solid var(--border);padding:2rem;box-shadow:var(--shadow-lg)}
.auth-tabs{display:flex;background:var(--bg);border-radius:12px;padding:4px;margin-bottom:1.25rem}
.auth-tab{flex:1;padding:8px;border:none;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:var(--muted);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s}
.auth-tab.active{background:var(--white);color:var(--blue-dark);box-shadow:var(--shadow)}

.admin-page{max-width:1100px;margin:0 auto;padding:1.5rem}
.admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem}
.admin-title{font-size:1.4rem;font-weight:800}
.admin-tabs{display:flex;gap:4px;background:var(--bg);border-radius:12px;padding:4px}
.admin-tab{padding:8px 16px;border:none;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:var(--muted);font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s}
.admin-tab.active{background:var(--white);color:var(--blue-dark);box-shadow:var(--shadow)}
.admin-stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:1.5rem}
.admin-stat-card{background:var(--white);border-radius:14px;border:1.5px solid var(--border);padding:1.25rem;box-shadow:var(--shadow)}
.admin-stat-val{font-size:2rem;font-weight:800;font-family:'Plus Jakarta Sans',sans-serif;color:var(--blue-dark)}
.admin-stat-lbl{font-size:12px;color:var(--muted);margin-top:4px}
.bookings-table{width:100%;border-collapse:collapse;font-size:13px}
.bookings-table th{background:var(--bg);padding:10px 12px;text-align:left;font-weight:700;font-size:11px;text-transform:uppercase;color:var(--muted);border-bottom:1.5px solid var(--border)}
.bookings-table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.bookings-table tr:hover td{background:var(--bg)}
.slot-manage-item{display:flex;align-items:center;justify-content:space-between;background:var(--white);border-radius:10px;border:1.5px solid var(--border);padding:10px 14px;margin-bottom:8px;font-size:13px}
.slot-add-form{background:var(--white);border-radius:14px;border:1.5px solid var(--border);padding:1.25rem;margin-bottom:1.5rem}
.admin-badge{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#fff3cd,#ffe066);color:#92400e;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;border:1px solid #ffc107}
.empty{text-align:center;padding:3rem 1rem;color:var(--muted)}
.empty-icon{font-size:2.5rem;margin-bottom:.5rem}

.contact-page{max-width:760px;margin:0 auto;padding:2rem 1.5rem;animation:fadeIn .3s ease}
.contact-hero{background:linear-gradient(135deg,var(--blue-darker),var(--blue-dark) 45%,var(--blue));border-radius:20px;padding:2.5rem 2rem;text-align:center;color:#fff;margin-bottom:2rem}
.contact-hero h2{font-size:1.8rem;font-weight:800;margin-bottom:.5rem}
.contact-hero p{opacity:.9;font-size:.95rem}
.contact-cards{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:2rem}
@media(max-width:560px){.contact-cards{grid-template-columns:1fr}}
.contact-card{background:var(--white);border-radius:16px;border:1.5px solid var(--border);padding:1.75rem 1.5rem;text-align:center;box-shadow:var(--shadow);transition:all .2s}
.contact-card:hover{border-color:var(--blue-mid);box-shadow:var(--shadow-lg);transform:translateY(-3px)}
.contact-card-icon{font-size:2.5rem;margin-bottom:.75rem}
.contact-card-title{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:.5rem}
.contact-card-value{font-size:1.05rem;font-weight:700;color:var(--blue-dark);margin-bottom:.4rem}
.contact-card-note{font-size:12px;color:var(--muted)}
.contact-card a{color:var(--blue-dark);font-weight:700;text-decoration:underline;text-underline-offset:2px}
.contact-form-box{background:var(--white);border-radius:16px;border:1.5px solid var(--border);padding:1.75rem;box-shadow:var(--shadow)}
.contact-form-box h3{font-size:1.05rem;font-weight:700;margin-bottom:1.25rem}
.contact-form-box textarea{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);outline:none;resize:vertical;min-height:110px;transition:border .2s}
.contact-form-box textarea:focus{border-color:var(--blue-dark);box-shadow:0 0 0 3px rgba(77,166,255,.15)}
.contact-info-note{background:var(--blue-light);border-radius:12px;padding:1rem 1.25rem;font-size:13px;color:var(--blue-darker);margin-top:1.25rem;border:1px solid var(--blue-mid)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes modalPop{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes bounceIn{0%{transform:scale(.3)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
</style>
</head>

const V={
  name: v=>v.trim().length>=2,
  phone:v=>/^[6-9]\d{9}$/.test(v.trim()),
  email:v=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim()),
  pass: v=>v.length>=6
};
const $=id=>document.getElementById(id);
const val=id=>$(id)?.value.trim()||'';
const passVal=id=>$(id)?.value||'';

function getAvail(p){return p.total-p.booked;}
function getStatus(p){
  const r=p.booked/p.total;
  if(r>=1)   return{label:'Full',cls:'badge-full'};
  if(r>=0.8) return{label:'Limited',cls:'badge-limited'};
  return          {label:'Available',cls:'badge-available'};
}
function fmtINR(n){return '₹'+n.toLocaleString('en-IN');}
function genId(){return 'PKT'+Math.random().toString(36).substr(2,6).toUpperCase();}
function genSlots(p){
  const bs=bookedSlotsMap[p.id]||new Set();
  return Array.from({length:p.total},(_,i)=>({id:i+1,booked:bs.has(i+1)}));
}
function slotSz(t){
  if(t<=50)  return{cols:10,size:'36px',font:'10px'};
  if(t<=150) return{cols:12,size:'32px',font:'9px'};
  if(t<=400) return{cols:15,size:'28px',font:'8px'};
  return          {cols:20,size:'22px',font:'7px'};
}
function canCancel(b){
  if(!b.date||!b.time) return false;
  return(new Date(b.date+'T'+b.time)-new Date())>3600000;
}
function fbErr(code){
  return({
    'auth/email-already-in-use':'This email is already registered. Please login instead.',
    'auth/invalid-email':'Please enter a valid email address.',
    'auth/weak-password':'Password must be at least 6 characters.',
    'auth/user-not-found':'No account found with this email.',
    'auth/wrong-password':'Incorrect password. Please try again.',
    'auth/invalid-credential':'Invalid email or password.',
    'auth/too-many-requests':'Too many attempts. Please wait a moment.',
    'permission-denied':'Firestore permission denied. Check security rules.',
  }[code]||'Something went wrong ('+code+'). Please try again.');
}
function toast(msg,type='info'){
  document.querySelector('.toast')?.remove();
  const t=document.createElement('div');
  t.className='toast '+type;t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3500);
}
function markErr(id,eid){$(id)?.classList.add('error');$(eid)?.classList.add('show');}
function clearErr(id,eid){$(id)?.classList.remove('error');$(eid)?.classList.remove('show');}

/* ── FIREBASE AUTH LISTENER ── */
let adminUnsubs=[];
auth.onAuthStateChanged(async user=>{
  if(user){
    try{
      // 1. Check users collection
      const uDoc=await db.collection('users').doc(user.uid).get();
      if(uDoc.exists){
        const d=uDoc.data();
        state.user={uid:user.uid,email:user.email,name:d.name,phone:d.phone||'',isAdmin:false};
        // Load their bookings
        const bSnap=await db.collection('bookings').where('userId','==',user.uid).get();
        state.bookings=bSnap.docs.map(d=>({...d.data(),_docId:d.id}));
      } else {
        // 2. Check admins collection
        const aDoc=await db.collection('admins').doc(user.uid).get();
        if(aDoc.exists){
          const d=aDoc.data();
          state.user={uid:user.uid,email:user.email,name:d.name,isAdmin:true,parkingLocationId:d.parkingLocationId};
          subscribeAdminData(d.parkingLocationId);
          if(state.page==='adminLogin'||state.page==='auth') state.page='admin';
        } else {
          // Profile missing — sign out
          console.warn('Auth user has no profile doc. Signing out.');
          await auth.signOut();
          return;
        }
      }
    }catch(e){
      console.error('Auth state error:',e);
      toast('Error: '+fbErr(e.code),'error');
    }
  } else {
    adminUnsubs.forEach(f=>f()); adminUnsubs=[];
    state.user=null; state.bookings=[]; state.adminBookings=[]; state.adminSlots=[];
    if(state.page==='bookings'||state.page==='admin') state.page='home';
  }
  render();
});

function subscribeAdminData(locId){
  adminUnsubs.forEach(f=>f()); adminUnsubs=[];
  if(!locId) return;
  adminUnsubs.push(
    db.collection('bookings').where('parkingLocationId','==',locId).onSnapshot(s=>{
      state.adminBookings=s.docs.map(d=>({...d.data(),_docId:d.id}));render();
    }),
    db.collection('slots').where('parkingLocationId','==',locId).onSnapshot(s=>{
      state.adminSlots=s.docs.map(d=>({...d.data(),_docId:d.id}));render();
    })
  );
}

window.doSignup=async function(){
  const name=val('auth-name'),email=val('auth-email'),
        phone=val('auth-phone'),pass=passVal('auth-pass');
  let ok=true;
  if(!V.name(name)) {markErr('auth-name','err-auth-name');ok=false;}
  if(!V.email(email)){markErr('auth-email','err-auth-email');ok=false;}
  if(!V.phone(phone)){markErr('auth-phone','err-auth-phone');ok=false;}
  if(!V.pass(pass)) {markErr('auth-pass','err-auth-pass');ok=false;}
  if(!ok){toast('Please fix the errors above','error');return;}
  const btn=$('auth-btn');
  if(btn){btn.disabled=true;btn.textContent='Creating account…';}
  try{
    const c=await auth.createUserWithEmailAndPassword(email,pass);
    await db.collection('users').doc(c.user.uid).set({
      name,email,phone,role:'user',createdAt:new Date().toISOString()
    });
    toast('Welcome, '+name.split(' ')[0]+'! 🎉','success');
    state.page='home';
  }catch(e){
    toast(fbErr(e.code),'error');
    if(btn){btn.disabled=false;btn.textContent='Create Account';}
  }
};

window.doLogin=async function(){
  const email=val('auth-email'),pass=passVal('auth-pass');
  if(!email){markErr('auth-email','err-auth-email');return;}
  if(!pass) {markErr('auth-pass','err-auth-pass');return;}
  const btn=$('auth-btn');
  if(btn){btn.disabled=true;btn.textContent='Logging in…';}
  try{
    await auth.signInWithEmailAndPassword(email,pass);
    toast('Welcome back! 👋','success');
    state.page='home';
  }catch(e){
    toast(fbErr(e.code),'error');
    if(btn){btn.disabled=false;btn.textContent='Login';}
  }
};

/* ── BOOKING ── */
window.processPayment=async function(pid,total){
  const p=state.parkingData.find(x=>x.id===pid);
  const bd=state.bookingData;
  if(bd.date&&bd.time&&new Date(bd.date+'T'+bd.time)<=new Date()){
    toast('Please select a future time.','error');state.modalStep=3;render();return;
  }
  if(bookedSlotsMap[pid]?.has(state.selectedSlot)){
    toast('Slot just taken. Please choose another.','error');
    state.modalStep=2;state.selectedSlot=null;render();return;
  }
  const btn=$('pay-btn');
  if(btn){btn.innerHTML='<span class="spinner"></span> Processing...';btn.disabled=true;}

  setTimeout(async()=>{
    const id=genId(),locId='p'+pid;
    bookedSlotsMap[pid].add(state.selectedSlot);
    p.booked=Math.min(p.total,p.booked+1);
    const bk={
      id,parking:p.name,parkingId:pid,parkingLocationId:locId,
      slot:state.selectedSlot,city:CITY_DB[state.city].name,
      date:bd.date,time:bd.time,duration:bd.duration||1,total,
      user:state.user?.email||'guest',userId:state.user?.uid||null,
      name:bd.name,phone:bd.phone,email:bd.email||state.user?.email||'',
      status:'Active',createdAt:new Date().toISOString()
    };
    state.bookings.push(bk);
    state.confirmation={...bk};
    state.modalStep=5;render();
    toast('Booking confirmed! 🎉','success');
    try{await db.collection('bookings').add(bk);}
    catch(e){console.error('Firestore save error:',e);}
  },1500);
};

window.cancelBooking=async function(bid,docId){
  const b=state.bookings.find(x=>x.id===bid);
  if(!b) return;
  if(!canCancel(b)){toast('Cancellation not allowed within 1 hour of booking time.','error');return;}
  if(!confirm('Cancel booking '+bid+'? This cannot be undone.')) return;
  if(docId){
    try{await db.collection('bookings').doc(docId).update({status:'Cancelled',cancelledAt:new Date().toISOString()});}
    catch(e){toast('Error: '+fbErr(e.code),'error');return;}
  }
  b.status='Cancelled';
  const pe=state.parkingData.find(x=>x.id===b.parkingId);
  if(pe){pe.booked=Math.max(0,pe.booked-1);bookedSlotsMap[b.parkingId]?.delete(b.slot);}
  render();toast('Booking cancelled.','info');
};

/* ── CITY ── */
function loadCity(slug){
  if(!CITY_DB[slug]) return;
  state.city=slug;state.area='All';state.search='';
  state.modal=null;state.modalStep=1;state.selectedSlot=null;
  state.parkingData=JSON.parse(JSON.stringify(CITY_DB[slug].parking));
  Object.keys(bookedSlotsMap).forEach(k=>delete bookedSlotsMap[k]);
  state.parkingData.forEach(p=>{
    const s=new Set();
    for(let i=1;i<=p.booked&&i<=p.total;i++) s.add(i);
    bookedSlotsMap[p.id]=s;
  });
  state.showCityDropdown=false;render();
  toast('Switched to '+CITY_DB[slug].name+' 📍','success');
}

  return`<div class="parking-card" onclick="openModal(${p.id})">
    <div class="card-img">${p.emoji}<span class="card-badge ${st.cls}">${st.label}</span></div>
    <div class="card-body">
      <div class="card-name">${p.name}</div>
      <div class="card-area">📍 ${p.area} · ${p.address.substring(0,35)}...</div>
      <div class="slot-bar"><div class="slot-fill" style="width:${pct}%"></div></div>
      <div class="slot-info"><span style="color:var(--success)">✓ ${a} available</span><span>${pct}% filled</span></div>
      <div class="card-meta" style="margin-top:8px">

    <div class="contact-form-box">
      <h3>✉️ Send us a Message</h3>
      <div class="form-group">
        <label class="form-label">Your Name</label>
        <input class="form-input" id="ct-name" type="text" placeholder="Enter your name">
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" id="ct-email" type="email" placeholder="Enter your email">
      </div>
      <div class="form-group">
        <label class="form-label">Phone Number (optional)</label>
        <input class="form-input" id="ct-phone" type="tel" placeholder="Enter your phone number">
      </div>
      <div class="form-group">
        <label class="form-label">Message</label>
        <textarea id="ct-msg" placeholder="Describe your issue or query here…"></textarea>
      </div>
      <button class="btn btn-primary" style="width:100%;padding:12px;font-size:15px" onclick="submitContact()">📨 Send Message</button>
      <div class="contact-info-note">
        💡 <strong>Quick tip:</strong> For booking-related issues, please include your Booking ID in the message so we can assist you faster.
      </div>
    </div>
  </div>`;
}

window.submitContact=async function(){
  const name=document.getElementById('ct-name')?.value.trim();
  const email=document.getElementById('ct-email')?.value.trim();
  const phone=document.getElementById('ct-phone')?.value.trim();
  const msg=document.getElementById('ct-msg')?.value.trim();
  if(!name||!email||!msg){toast('Please fill in your name, email and message.','error');return;}
  if(!V.email(email)){toast('Please enter a valid email address.','error');return;}
  const btn=document.querySelector('.contact-form-box .btn-primary');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Sending...';}
  try{
    await emailjs.send('service_0iswtrf','template_ybgfsxb',{
      from_name:name,
      from_email:email,
      phone:phone||'Not provided',
      message:msg
    });
    toast('Message sent! We\'ll get back to you soon. 😊','success');
    document.getElementById('ct-name').value='';
    document.getElementById('ct-email').value='';
    document.getElementById('ct-phone').value='';
    document.getElementById('ct-msg').value='';
  }catch(e){
    console.error('EmailJS error:',e);
    const reason=e?.text||e?.message||JSON.stringify(e)||'Unknown error';
    toast('Error: '+reason,'error');
  }finally{
    if(btn){btn.disabled=false;btn.innerHTML='📨 Send Message';}
  }
};

/* ── STEP 3 VALIDATION ── */
window.validateStep3=function(){
  const bd=state.bookingData;let ok=true;
  if(!V.name(bd.name)) {markErr('bk-name','err-bk-name');ok=false;}
  if(!V.phone(bd.phone)){markErr('bk-phone','err-bk-phone');ok=false;}
  if(!bd.date){markErr('bk-date','err-bk-date');ok=false;}
  if(!bd.time){markErr('bk-time','err-bk-time');ok=false;}
  if(bd.date&&bd.time&&new Date(bd.date+'T'+bd.time)<=new Date()){
    markErr('bk-time','err-bk-time');toast('Please select a future time slot.','error');ok=false;
  }
  if(!ok){toast('Please fill all required fields.','error');return;}
  nextStep();
};

/* ── GLOBAL ACTIONS ── */
window.switchCity        =slug=>loadCity(slug);
window.toggleCityDropdown=()=>{state.showCityDropdown=!state.showCityDropdown;state.citySearch='';render();};
window.updateCitySearch  =v=>{state.citySearch=v;render();};
window.goPage            =p=>{state.page=p;state.modal=null;state.showCityDropdown=false;render();};
window.areaChange        =a=>{state.area=a;render();};
window.searchChange      =v=>{state.search=v;render();};
window.openModal         =id=>{
  if(!state.user){toast('Please login to book.','error');state.page='auth';render();return;}
  if(state.user.isAdmin && !state.adminViewingAsUser){toast('Switch to User Mode to book a slot.','info');return;}
  state.modal=id;state.modalStep=1;state.selectedSlot=null;state.confirmation=null;render();
};
window.closeModal        =()=>{state.modal=null;state.modalStep=1;state.selectedSlot=null;state.bookingData={name:'',phone:'',email:'',date:'',time:'',duration:1};render();};
window.closeModalOverlay =e=>{if(e.target.classList.contains('modal-overlay'))closeModal();};
window.nextStep          =()=>{state.modalStep++;render();};
window.prevStep          =()=>{state.modalStep--;render();};
window.selectSlot        =id=>{state.selectedSlot=id;render();};
window.updateBooking     =(k,v)=>{state.bookingData[k]=v;};
window.setAuthMode       =m=>{state.authMode=m;render();};
window.setAdminTab       =t=>{state.adminTab=t;render();};

document.addEventListener('click',e=>{
  if(state.showCityDropdown&&!e.target.closest('.hero-city-wrapper')){
    state.showCityDropdown=false;render();
  }
},true);
</script>
